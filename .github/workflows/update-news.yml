name: Update News + Actuals (near-live)

on:
  schedule:
    # Every 5 minutes (fastest GitHub Actions cron). On release days this
    # picks up NFP/CPI/BOE actuals within a few minutes of the wire.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run locked-whitelist news engine (TradingView actuals + schedule)
        run: |
          python sr_vault_news_scan.py --auto

      - name: Run ZeroHedge RSS updater (optional)
        continue-on-error: true
        run: |
          if [ -f update_zerohedge.py ]; then
            python update_zerohedge.py
          else
            echo "update_zerohedge.py not present — skip"
          fi

      - name: Commit and push fresh JSONs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sr_vault_assets/news/myfxbook_news.json \
                  sr_vault_assets/news/economic_calendar.json \
                  sr_vault_assets/news/zerohedge.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to news feeds."
          else
            git commit -m "chore: near-live calendar + actuals refresh"
            git push
            echo "News feeds updated and pushed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
