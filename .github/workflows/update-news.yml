name: Update News + ZeroHedge Feed (Hourly)

on:
  schedule:
    # Run every hour. (ZeroHedge RSS is polled on the same cadence; the panel's
    # client JS additionally re-fetches the JSON every 2 min with cache-bust so
    # the widget feels constantly live once the Action has committed a new file.)
    - cron: '0 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated JSON(s)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for commit

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run economic news scan in auto mode (Forex Factory public feed + strict filters + curated 6-month backend calendar)
        # Hybrid mode: live near-term from public FF thisweek.json + the long-term curated events
        # from RESEARCHED_EVENTS in the script (your "backend economic calendar").
        # This guarantees important events like BOE rate decisions and GBP inflation appear in NEXT WEEK etc.
        # The script merges, filters with your whitelist, and writes the JSON the panel uses.
        # Run hourly so near-term is always fresh; full calendar refreshed when you update the list in the script
        # (every 2 weeks or on schedule changes) and re-trigger or wait for cron.
        run: python sr_vault_news_scan.py --auto

      - name: Update ZeroHedge feed from public RSS (no keys, keeps @zerohedge widget fresh)
        # Uses cms.zerohedge.com/fullrss2.xml (the canonical public feed for their articles/headlines).
        # This replaces the old manual "tell Grok to paste posts" flow. The panel already has
        # loadZeroHedgeFromJSON + 2-min setInterval + age updater + refresh button.
        run: python update_zerohedge.py

      - name: Commit & push any updated JSON(s) (news and/or zerohedge)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sr_vault_assets/news/myfxbook_news.json sr_vault_assets/news/economic_calendar.json sr_vault_assets/news/zerohedge.json
          if git diff --cached --quiet; then
            echo "No changes to news or ZeroHedge JSON"
          else
            git commit -m "chore: hourly auto-update (economic news via FF thisweek + curated 6-month backend calendar in economic_calendar.json + ZeroHedge RSS)"
            git push
          fi
